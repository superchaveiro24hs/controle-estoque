<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque - Super Chaveiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        danger: '#F53F3F',
                        warning: '#FF7D00',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Tela de Login -->
    <div id="telaLogin" class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <div class="text-center mb-6">
                <i class="fa fa-shield text-primary text-5xl mb-3"></i>
                <h2 class="text-2xl font-bold text-gray-800">Acesso ao Sistema</h2>
                <p class="text-gray-500">Super Chaveiro 24h</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha de Acesso</label>
                    <input type="password" id="senhaAcesso" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition" placeholder="Digite a senha">
                </div>
                <button id="btnEntrar" class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-2.5 rounded-lg transition">
                    Entrar
                </button>
            </div>
        </div>
    </div>

    <!-- Sistema Principal -->
    <div id="sistemaPrincipal" class="hidden min-h-screen">
        <!-- Cabeçalho -->
        <header class="bg-primary text-white shadow-md">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa fa-key text-2xl"></i>
                    <h1 class="text-xl font-bold">Controle de Estoque - Super Chaveiro</h1>
                </div>
                <button id="btnSair" class="text-white/80 hover:text-white transition">
                    <i class="fa fa-sign-out mr-1"></i> Sair
                </button>
            </div>
        </header>

        <main class="container mx-auto px-4 py-6">
            <!-- Avisos -->
            <div id="avisoSucesso" class="hidden bg-success/10 text-success p-3 rounded-lg mb-6 flex items-center gap-2">
                <i class="fa fa-check-circle"></i>
                <span id="textoSucesso">Produto salvo com sucesso!</span>
            </div>
            <div id="avisoErro" class="hidden bg-danger/10 text-danger p-3 rounded-lg mb-6 flex items-center gap-2">
                <i class="fa fa-exclamation-circle"></i>
                <span id="textoErro">Erro ao salvar produto.</span>
            </div>

            <!-- Cadastro de Produto -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa fa-plus-circle text-primary"></i> Cadastrar Novo Produto
                </h2>
                <form id="formProduto" class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Produto</label>
                        <input type="text" id="nomeProduto" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition" placeholder="Ex: Chave Tipo Y">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Código / Referência</label>
                        <input type="text" id="codigoProduto" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition" placeholder="Ex: CHV-001">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantidade</label>
                        <input type="number" id="quantidadeProduto" min="1" value="1" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Observação</label>
                        <input type="text" id="obsProduto" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition" placeholder="Detalhes adicionais">
                    </div>
                    <div class="md:col-span-3 flex justify-end">
                        <button type="submit" class="bg-success hover:bg-success/90 text-white font-medium px-6 py-2 rounded-lg transition">
                            <i class="fa fa-save mr-2"></i> Salvar Produto
                        </button>
                    </div>
                </form>
            </div>

            <!-- Lista de Produtos -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                        <i class="fa fa-list text-primary"></i> Produtos Cadastrados
                    </h2>
                    <div class="text-sm text-gray-500">Total: <span id="totalProdutos">0</span></div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-3 px-2 font-semibold text-gray-600">Nome</th>
                                <th class="text-left py-3 px-2 font-semibold text-gray-600">Código</th>
                                <th class="text-center py-3 px-2 font-semibold text-gray-600">Qtd</th>
                                <th class="text-left py-3 px-2 font-semibold text-gray-600">Observação</th>
                                <th class="text-right py-3 px-2 font-semibold text-gray-600">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaProdutos" class="text-gray-700">
                            <tr>
                                <td colspan="5" class="py-4 px-2 text-center text-gray-500">Nenhum produto cadastrado ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURAÇÕES - COLOQUE SUAS INFOS AQUI
        const SENHA_SISTEMA = "123456"; // Troque pela sua senha
        const USUARIO_GITHUB = "superchaveiro24hs";
        const REPOSITORIO_GITHUB = "controle-estoque";
        const ARQUIVO_DADOS = "dados.json";
        // ⚠️ COLOQUE SEU TOKEN AQUI (vai te ensinar a pegar agora)
        const TOKEN_GITHUB = "SEU_TOKEN_AQUI"; 

        // Controle de Login
        const telaLogin = document.getElementById('telaLogin');
        const sistemaPrincipal = document.getElementById('sistemaPrincipal');
        const btnEntrar = document.getElementById('btnEntrar');
        const senhaAcesso = document.getElementById('senhaAcesso');
        const btnSair = document.getElementById('btnSair');

        btnEntrar.addEventListener('click', () => {
            if (senhaAcesso.value === SENHA_SISTEMA) {
                telaLogin.classList.add('hidden');
                sistemaPrincipal.classList.remove('hidden');
                carregarDados();
            } else {
                mostrarAvisoErro("Senha incorreta!");
            }
        });

        btnSair.addEventListener('click', () => {
            sistemaPrincipal.classList.add('hidden');
            telaLogin.classList.remove('hidden');
            senhaAcesso.value = "";
        });

        // Avisos
        function mostrarAvisoSucesso(texto) {
            const aviso = document.getElementById('avisoSucesso');
            document.getElementById('textoSucesso').textContent = texto;
            aviso.classList.remove('hidden');
            setTimeout(() => aviso.classList.add('hidden'), 3000);
        }

        function mostrarAvisoErro(texto) {
            const aviso = document.getElementById('avisoErro');
            document.getElementById('textoErro').textContent = texto;
            aviso.classList.remove('hidden');
            setTimeout(() => aviso.classList.add('hidden'), 3000);
        }

        // Gerenciar Dados
        let listaProdutos = [];

        // Salvar também no navegador (para não perder nunca)
        function salvarLocal() {
            localStorage.setItem('produtosEstoque', JSON.stringify(listaProdutos));
        }

        function carregarLocal() {
            const dados = localStorage.getItem('produtosEstoque');
            if (dados) listaProdutos = JSON.parse(dados);
        }

        // Salvar no GitHub
        async function salvarNoGitHub() {
            if (TOKEN_GITHUB === "SEU_TOKEN_AQUI") {
                mostrarAvisoSucesso("Salvo no navegador! (Token não configurado)");
                return;
            }

            try {
                // 1. Pegar o arquivo atual para pegar o SHA
                const resGet = await fetch(`https://api.github.com/repos/${USUARIO_GITHUB}/${REPOSITORIO_GITHUB}/contents/${ARQUIVO_DADOS}`);
                const dadosArquivo = await resGet.json();
                const sha = dadosArquivo.sha;

                // 2. Preparar conteúdo
                const conteudo = btoa(unescape(encodeURIComponent(JSON.stringify(listaProdutos, null, 2))));

                // 3. Enviar alteração
                await fetch(`https://api.github.com/repos/${USUARIO_GITHUB}/${REPOSITORIO_GITHUB}/contents/${ARQUIVO_DADOS}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${TOKEN_GITHUB}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: "Atualização automática dos dados",
                        content: conteudo,
                        sha: sha,
                        branch: "main"
                    })
                });

                mostrarAvisoSucesso("Salvo com sucesso no GitHub e no navegador!");
            } catch (erro) {
                console.error(erro);
                mostrarAvisoSucesso("Salvo apenas no navegador!");
            }
        }

        // Carregar dados
        async function carregarDados() {
            carregarLocal(); // Carrega primeiro do navegador

            if (TOKEN_GITHUB !== "SEU_TOKEN_AQUI") {
                try {
                    const res = await fetch(`https://api.github.com/repos/${USUARIO_GITHUB}/${REPOSITORIO_GITHUB}/contents/${ARQUIVO_DADOS}`);
                    const dados = await res.json();
                    const conteudo = decodeURIComponent(escape(atob(dados.content)));
                    listaProdutos = JSON.parse(conteudo);
                    salvarLocal(); // Atualiza o navegador com o que está no GitHub
                } catch (erro) {
                    console.log("Usando dados locais");
                }
            }

            atualizarTabela();
        }

        // Cadastrar Produto
        document.getElementById('formProduto').addEventListener('submit', (e) => {
            e.preventDefault();

            const produto = {
                id: Date.now(),
                nome: document.getElementById('nomeProduto').value,
                codigo: document.getElementById('codigoProduto').value,
                quantidade: parseInt(document.getElementById('quantidadeProduto').value),
                observacao: document.getElementById('obsProduto').value,
                data: new Date().toLocaleString('pt-BR')
            };

            listaProdutos.push(produto);
            salvarLocal();
            salvarNoGitHub();
            atualizarTabela();

            // Limpar formulário
            document.getElementById('nomeProduto').value = "";
            document.getElementById('codigoProduto').value = "";
            document.getElementById('quantidadeProduto').value = 1;
            document.getElementById('obsProduto').value = "";
        });

        // Atualizar Tabela
        function atualizarTabela() {
            const tbody = document.getElementById('listaProdutos');
            const total = document.getElementById('totalProdutos');
            total.textContent = listaProdutos.length;

            if (listaProdutos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-4 px-2 text-center text-gray-500">Nenhum produto cadastrado ainda.</td></tr>`;
                return;
            }

            tbody.innerHTML = "";
            listaProdutos.forEach((produto, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="py-3 px-2">${produto.nome}</td>
                    <td class="py-3 px-2">${produto.codigo || "-"}</td>
                    <td class="py-3 px-2 text-center font-medium">${produto.quantidade}</td>
                    <td class="py-3 px-2 text-gray-600">${produto.observacao || "-"}</td>
                    <td class="py-3 px-2 text-right">
                        <button onclick="excluirProduto(${index})" class="text-danger hover:text-danger/80 transition">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Excluir Produto
        function excluirProduto(index) {
            if (confirm("Deseja excluir esse produto?")) {
                listaProdutos.splice(index, 1);
                salvarLocal();
                salvarNoGitHub();
                atualizarTabela();
            }
        }
    </script>
</body>
</html>
